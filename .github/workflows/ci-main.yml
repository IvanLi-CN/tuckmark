name: ci-main

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  release-snapshot:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    name: CI Main / Release Snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libdbus-1-dev
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Workspace checks
        run: bun run check
      - id: snapshot
        name: Write release snapshot
        run: node .github/scripts/release-snapshot.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.snapshot.outputs.artifact_name }}
          path: work/release/release-intent.json

name: pages

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Published release tag to expose in Pages footer metadata."
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Pages Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || 'refs/heads/main' }}
          fetch-depth: 0
          submodules: recursive
      - name: Validate and check out manual release tag
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_NAME: ${{ inputs.release_tag }}
        run: |
          tag_name="$RELEASE_TAG_NAME"
          case "$tag_name" in
            v[0-9]*)
              ;;
            *)
              echo "release_tag must be a published release tag like v1.2.3" >&2
              exit 1
              ;;
          esac
          gh release view "$tag_name" --json tagName >/dev/null
          git fetch --depth=1 origin "refs/tags/$tag_name:refs/tags/$tag_name"
          git checkout --detach "refs/tags/$tag_name"
          git submodule update --init --recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.14.0
      - uses: actions/configure-pages@v5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Resolve build metadata
        env:
          RELEASE_TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
        run: |
          echo "TUCKMARK_BUILD_REF=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          tag_name="$RELEASE_TAG_NAME"
          if [ -n "$tag_name" ]; then
            echo "TUCKMARK_APP_VERSION=${tag_name#v}" >> "$GITHUB_ENV"
          fi
      - name: Build web demo
        env:
          TUCKMARK_WEB_SURFACE: browser-static
        run: bun run build:web:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

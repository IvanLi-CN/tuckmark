name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Pages Deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          fetch-depth: 0
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.14.0
      - uses: actions/configure-pages@v5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Resolve mainline app version
        run: |
          echo "TUCKMARK_APP_VERSION=main+$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
      - name: Build web demo
        env:
          TUCKMARK_WEB_SURFACE: browser-static
        run: bun run build:web:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

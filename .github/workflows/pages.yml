name: pages

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Published release tag to expose in Pages footer metadata."
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Pages Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref }}
          fetch-depth: 0
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.14.0
      - uses: actions/configure-pages@v5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Resolve release version
        if: ${{ github.event_name == 'release' || inputs.release_tag != '' }}
        env:
          RELEASE_TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
        run: |
          tag_name="$RELEASE_TAG_NAME"
          if [ -z "$tag_name" ]; then
            echo "Could not resolve release tag for Pages build." >&2
            exit 1
          fi
          echo "TUCKMARK_APP_VERSION=${tag_name#v}" >> "$GITHUB_ENV"
      - name: Build web demo
        env:
          TUCKMARK_WEB_SURFACE: browser-static
        run: bun run build:web:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

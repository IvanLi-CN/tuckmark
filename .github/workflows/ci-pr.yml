name: ci-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  workspace:
    name: CI PR / Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libdbus-1-dev
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Workspace checks
        run: bun run check

  web-demo:
    name: CI PR / Web Demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libdbus-1-dev
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Pages demo
        run: bun run build:web:pages
      - name: Build Storybook
        run: bun run --filter @tuckmark/web build:storybook
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Run Playwright demo checks
        run: bun run test:e2e:web
